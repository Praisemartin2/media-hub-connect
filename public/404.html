<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Creating Opportunities for Youth Inc.</title>
    <script>
      // GitHub Pages SPA fallback: remember where the user wanted to go,
      // then bounce to the app's base path so the React router can take over.
      (function () {
        var base = "/media-hub-connect/";
        sessionStorage.redirect = location.href;
        location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
